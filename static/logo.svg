<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background -->
  <rect width="100" height="100" rx="22" fill="#fb3640"/>
  <!-- depth layer: darken bottom quarter -->
  <path d="M0,72 L0,78 Q0,100 22,100 L78,100 Q100,100 100,78 L100,72 Z" fill="rgba(0,0,0,0.20)"/>
  <!-- glass highlight: bright ellipse top-centre -->
  <ellipse cx="50" cy="20" rx="30" ry="10" fill="rgba(255,255,255,0.14)"/>
  <!-- inner border ring -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- P bowl arc -->
  <path d="M 24 18 L 49 18 Q 74 18 74 37 Q 74 56 49 56 L 24 56"
        fill="none" stroke="white" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- P stem flowing into V:
       down from top of stem → turns into left leg of V → right leg back up -->
  <path d="M 24 18 L 24 56 L 43 82 L 62 56"
        fill="none" stroke="white" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
