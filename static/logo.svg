<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c42028"/>
      <stop offset="100%" stop-color="#fb3640"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Vivid gradient background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle top-left shine -->
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>

  <!-- Inner border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="21" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- P lettermark in white -->
  <!-- Vertical stem -->
  <line x1="28" y1="20" x2="28" y2="80"
        stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Bowl: top → arc right → back to mid-stem -->
  <path d="M 28 20 L 51 20 Q 75 20 75 38 Q 75 57 51 57 L 28 57"
        fill="none" stroke="white" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
