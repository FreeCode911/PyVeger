<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PyPanel V3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>body { background: #0f1117; }</style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-100">
  <div class="w-full max-w-sm mx-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">⚡</div>
      <h1 class="text-2xl font-bold text-white tracking-tight">PyPanel <span class="text-[#6366f1]">V3</span></h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your panel</p>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-900/40 border border-red-700 text-red-300 text-sm text-center">
      ❌ Invalid username or password
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/login" class="bg-[#1a1d27] border border-[#2a2d3e] rounded-xl p-6 flex flex-col gap-4">
      <div>
        <label class="block text-xs text-gray-400 mb-1.5" for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus
          placeholder="admin"
          class="w-full bg-[#0f1117] border border-[#2a2d3e] rounded-lg px-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-[#6366f1]" />
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1.5" for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
          placeholder="••••••••"
          class="w-full bg-[#0f1117] border border-[#2a2d3e] rounded-lg px-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-[#6366f1]" />
      </div>
      <button type="submit"
        class="w-full bg-[#6366f1] hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-1">
        Sign In
      </button>
    </form>

    <p class="text-center text-xs text-gray-600 mt-5">
      Default credentials are set in <code class="text-gray-500">config.json</code>
    </p>
  </div>
</body>
</html>
